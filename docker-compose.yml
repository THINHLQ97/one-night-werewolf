services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:3001"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 10.177.0.0/16
          gateway: 10.177.0.1
